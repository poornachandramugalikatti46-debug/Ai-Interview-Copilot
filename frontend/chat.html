<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat Assistant</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .header {
      background: rgba(0,0,0,0.3);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .dot {
      width: 12px;
      height: 12px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: rgba(255,255,255,0.95);
    }
    
    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    
    .msg.user {
      justify-content: flex-end;
    }
    
    .msg.ai {
      justify-content: flex-start;
    }
    
    .avatar {
      font-size: 24px;
      min-width: 30px;
      text-align: center;
    }
    
    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    
    .msg.user .bubble {
      background: #667eea;
      color: white;
      border-radius: 18px 18px 4px 18px;
    }
    
    .msg.ai .bubble {
      background: #e5e7eb;
      color: #1f2937;
      border-radius: 18px 18px 18px 4px;
    }
    
    .input-row {
      display: flex;
      gap: 10px;
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }
    
    #userInput {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
    }
    
    #sendBtn {
      padding: 12px 20px;
      background: #4ade80;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.3s;
    }
    
    #sendBtn:hover {
      background: #22c55e;
    }
    
    #sendBtn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    
    .hint {
      padding: 0 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.3);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <div class="dot"></div>
      <span>AI Assistant - Interview Coach</span>
    </div>

    <div class="messages" id="messages">
      <div class="msg ai">
        <span class="avatar">🤖</span>
        <div class="bubble">👋 Hi! I'm your AI Interview Coach. Ask me anything about interview preparation, coding, concepts, behavioral questions, or career guidance. I'll provide accurate, helpful answers tailored to your level!</div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="userInput" placeholder="Ask me anything... (Shift+Enter for new line)" rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <p class="hint">💡 Tip: Enter to send · Shift+Enter for new line</p>
  </div>

  <script src="js/chat.js"></script>
</body>
</html>
